name: Deploy to AWS App Runner

on:
  push:
    branches: [ main ]
    paths:
      - 'marketing_agent/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: marketing-agent

jobs:
  deploy:
    name: Deploy to AWS App Runner
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd marketing_agent
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Update App Runner service
      if: github.ref == 'refs/heads/main'
      run: |
        SERVICE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='marketing-agent'].ServiceArn" --output text)
        if [ -n "$SERVICE_ARN" ]; then
          echo "Updating existing App Runner service..."
          aws apprunner start-deployment --service-arn "$SERVICE_ARN"
        else
          echo "App Runner service not found. Please create it manually first."
        fi

    - name: Deployment status
      run: |
        echo "✅ Deployment completed successfully!"
        echo "Image pushed: ${{ steps.build-image.outputs.image }}"
        echo "Next: Check App Runner console for deployment status"
