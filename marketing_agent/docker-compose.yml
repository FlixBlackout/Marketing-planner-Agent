# =============================================================================
# Docker Compose Configuration
# Orchestrates Marketing Planning Assistant with dependencies
# =============================================================================

version: '3.8'

# Define networks
networks:
  marketing-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# Define volumes
volumes:
  redis-data:
    driver: local
  app-logs:
    driver: local

# Services
services:
  # =============================================================================
  # Marketing Planning Assistant API
  # =============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: marketing-agent-api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemini-2.0-flash-001}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=info
      - APP_ENV=production
    volumes:
      - app-logs:/app/logs
      - ./data:/app/data
    networks:
      - marketing-net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Redis for caching and session management
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: marketing-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - marketing-net
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # =============================================================================
  # Nginx Reverse Proxy
  # =============================================================================
  nginx:
    image: nginx:alpine
    container_name: marketing-agent-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - marketing-net
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # =============================================================================
  # Development Service (Optional)
  # =============================================================================
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: marketing-agent-dev
    ports:
      - "8001:8000"
    environment:
      - PORT=8000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - APP_ENV=development
      - DEBUG=true
    volumes:
      - .:/app
      - /app/__pycache__
    networks:
      - marketing-net
    depends_on:
      - redis
    restart: "no"
    profiles:
      - dev
    command: python -m uvicorn api:app --host 0.0.0.0 --port 8000 --reload

# =============================================================================
# Development Override
# Usage: docker-compose --profile dev up
# =============================================================================
