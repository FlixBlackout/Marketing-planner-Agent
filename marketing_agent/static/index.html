<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Planning Assistant | Agentic AI</title>
    
    <!-- Core Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e7ff;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Initial static loader while React loads -->
        <div style="display: flex; height: 100vh; width: 100%; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; color: #6366f1;">
            <div class="spinner"></div>
            <p style="font-weight: 600;">Starting Agent Environment...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Stable UI Components ---
        
        const Button = ({ children, onClick, loading, disabled, variant = "primary", className = "" }) => {
            const baseStyles = "px-6 py-3 rounded-xl font-semibold transition-all duration-200 flex items-center justify-center gap-2 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed";
            const variants = {
                primary: "bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg shadow-indigo-200",
                secondary: "bg-white text-slate-700 border border-slate-200 hover:bg-slate-50",
            };
            
            return (
                <button 
                    type="button"
                    onClick={(e) => {
                        e.preventDefault();
                        if (onClick) onClick();
                    }} 
                    disabled={loading || disabled}
                    className={`${baseStyles} ${variants[variant]} ${className}`}
                >
                    {loading ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : children}
                </button>
            );
        };

        const Card = ({ children, title, emoji, className = "" }) => (
            <div className={`glass-card p-6 rounded-2xl ${className}`}>
                {title && (
                    <div className="flex items-center gap-3 mb-4">
                        {emoji && <div className="p-2 bg-indigo-50 rounded-lg text-xl">{emoji}</div>}
                        <h3 className="text-lg font-bold text-slate-800 tracking-tight">{title}</h3>
                    </div>
                )}
                {children}
            </div>
        );

        const SectionHeader = ({ title, emoji }) => (
            <div className="flex items-center gap-2 mb-4 mt-8 first:mt-0">
                <span className="text-xl">{emoji}</span>
                <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">{title}</h3>
            </div>
        );

        const Badge = ({ children, color = "indigo" }) => {
            const colors = {
                indigo: "bg-indigo-50 text-indigo-600 border-indigo-100",
                amber: "bg-amber-50 text-amber-600 border-amber-100",
                emerald: "bg-emerald-50 text-emerald-600 border-emerald-100",
                rose: "bg-rose-50 text-rose-600 border-rose-100",
                slate: "bg-slate-50 text-slate-600 border-slate-100"
            };
            return (
                <span className={`px-2 py-1 rounded-md text-[9px] font-black uppercase tracking-wider border ${colors[color]}`}>
                    {children}
                </span>
            );
        };

        const DaywisePlan = ({ schedule }) => {
            if (!schedule || !schedule.scheduled_tasks) return null;
            
            const totalDays = schedule.total_duration_days || 0;
            const days = Array.from({ length: totalDays }, (_, i) => i + 1);
            
            return (
                <div className="space-y-4">
                    {days.map(day => {
                        const tasksForDay = schedule.scheduled_tasks.filter(t => 
                            day >= t.start_day && day <= t.end_day
                        );
                        
                        if (tasksForDay.length === 0) return null;
                        
                        return (
                            <div key={day} className="flex gap-4 items-start group">
                                <div className="flex-shrink-0 w-16 text-right pt-1">
                                    <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest group-hover:text-indigo-400 transition-colors">Day {day}</span>
                                </div>
                                <div className="flex-grow space-y-2">
                                    {tasksForDay.map(task => (
                                        <div key={task.task_id} className="p-3 bg-white border border-slate-100 rounded-xl shadow-sm hover:shadow-md transition-shadow">
                                            <div className="flex justify-between items-center">
                                                <h5 className="text-xs font-bold text-slate-700">{task.task_name}</h5>
                                                <span className="text-[9px] text-slate-400">{task.start_date}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const App = () => {
            const [goal, setGoal] = useState("");
            const [duration, setDuration] = useState(14);
            const [instructions, setInstructions] = useState("");
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);

            const handlePlan = async () => {
                if (!goal.trim()) return;
                
                setLoading(true);
                setError(null);
                setResult(null);
                
                try {
                    const response = await fetch('/plan', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            goal, 
                            use_ai: true,
                            duration_days: parseInt(duration),
                            custom_instructions: instructions
                        })
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.detail || 'Server error occurred');
                    }
                    
                    const data = await response.json();
                    setResult(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen pb-20 px-6 max-w-7xl mx-auto">
                    <header className="py-12 flex items-center gap-4">
                        <div className="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-xl shadow-indigo-200 text-3xl">
                            🤖
                        </div>
                        <div>
                            <h1 className="text-3xl font-black text-slate-800 tracking-tight uppercase">Agentic Planner</h1>
                            <p className="text-sm text-slate-500 font-bold uppercase tracking-[0.2em] opacity-70">Marketing Strategy System</p>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Left Sidebar: Controls */}
                        <div className="lg:col-span-4 space-y-6">
                            <Card title="Project Config" emoji="⚙️">
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2 block">Marketing Goal</label>
                                        <textarea 
                                            className="w-full h-28 p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all resize-none text-slate-700 text-sm"
                                            placeholder="e.g. Launch a high-end coffee brand..."
                                            value={goal}
                                            onChange={(e) => setGoal(e.target.value)}
                                            disabled={loading}
                                        />
                                    </div>

                                    <div>
                                        <div className="flex justify-between items-center mb-2">
                                            <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest block">Duration</label>
                                            <span className="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full">{duration} Days</span>
                                        </div>
                                        <input 
                                            type="range" 
                                            min="3" 
                                            max="60" 
                                            value={duration}
                                            onChange={(e) => setDuration(e.target.value)}
                                            className="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                            disabled={loading}
                                        />
                                        <div className="flex justify-between mt-1">
                                            <span className="text-[9px] text-slate-300 font-bold">3D</span>
                                            <span className="text-[9px] text-slate-300 font-bold">60D</span>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2 block">Custom Constraints</label>
                                        <textarea 
                                            className="w-full h-24 p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all resize-none text-slate-700 text-sm"
                                            placeholder="e.g. Focus on TikTok, No paid ads..."
                                            value={instructions}
                                            onChange={(e) => setInstructions(e.target.value)}
                                            disabled={loading}
                                        />
                                    </div>

                                    <Button 
                                        className="w-full" 
                                        onClick={handlePlan} 
                                        loading={loading} 
                                        disabled={!goal.trim() || loading}
                                    >
                                        Build Custom Plan ✨
                                    </Button>
                                </div>
                                
                                {error && (
                                    <div className="mt-4 p-4 bg-red-50 border border-red-100 rounded-xl text-red-600 text-sm font-bold">
                                        ⚠️ Error: {error}
                                    </div>
                                )}
                            </Card>

                            {result && result.interpretation && (
                                <Card title="Intelligence" emoji="🧠">
                                    <div className="space-y-6">
                                        {result.interpretation.target_audience && (
                                            <div>
                                                <SectionHeader title="Target Audience" emoji="👥" />
                                                <p className="text-sm text-slate-600 leading-relaxed">{result.interpretation.target_audience}</p>
                                            </div>
                                        )}
                                        {result.interpretation.success_metrics && (
                                            <div>
                                                <SectionHeader title="Success Metrics" emoji="📈" />
                                                <div className="flex flex-wrap gap-2">
                                                    {(Array.isArray(result.interpretation.success_metrics) ? result.interpretation.success_metrics : [result.interpretation.success_metrics]).map((m, i) => (
                                                        <Badge key={i} color="emerald">{m}</Badge>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        {result.interpretation.challenges && (
                                            <div>
                                                <SectionHeader title="Key Challenges" emoji="⚠️" />
                                                <ul className="space-y-2">
                                                    {(Array.isArray(result.interpretation.challenges) ? result.interpretation.challenges : [result.interpretation.challenges]).map((c, i) => (
                                                        <li key={i} className="text-sm text-slate-600 flex gap-2">
                                                            <span className="text-rose-400 font-bold">•</span> {c}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}
                                    </div>
                                </Card>
                            )}
                        </div>

                        {/* Right Content: Plan Details */}
                        <div className="lg:col-span-8">
                            {loading ? (
                                <div className="h-full min-h-[500px] glass-card rounded-3xl flex flex-col items-center justify-center py-20 space-y-6">
                                    <div className="spinner"></div>
                                    <div className="text-center">
                                        <h3 className="text-2xl font-black text-slate-800">Agent Reasoning...</h3>
                                        <p className="text-slate-500 font-medium">Optimizing for {duration} days with custom constraints</p>
                                    </div>
                                </div>
                            ) : result ? (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    {/* Plan Hero Summary */}
                                    <div className="gradient-bg p-10 rounded-3xl text-white shadow-2xl shadow-indigo-100 relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full -mr-32 -mt-32"></div>
                                        <div className="relative z-10">
                                            <div className="flex justify-between items-start mb-8">
                                                <div className="max-w-xl">
                                                    <span className="text-[10px] font-black uppercase tracking-[0.3em] opacity-60 mb-2 block">Executive Strategy</span>
                                                    <h2 className="text-3xl font-black leading-tight tracking-tight">{result.interpretation?.primary_objective || result.interpretation?.interpreted_objective || "Marketing Strategy"}</h2>
                                                    {result.interpretation?.recommended_approach && (
                                                        <p className="mt-6 text-indigo-50 text-base leading-relaxed opacity-90 italic border-l-4 border-indigo-300/30 pl-4">
                                                            "{result.interpretation.recommended_approach}"
                                                        </p>
                                                    )}
                                                </div>
                                                <div className="text-5xl drop-shadow-lg">✨</div>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                <div className="bg-white/10 p-4 rounded-2xl border border-white/10 backdrop-blur-sm">
                                                    <p className="text-[10px] font-black uppercase opacity-60 mb-1">Actions</p>
                                                    <p className="text-2xl font-black">{result.tasks?.length || 0}</p>
                                                </div>
                                                <div className="bg-white/10 p-4 rounded-2xl border border-white/10 backdrop-blur-sm">
                                                    <p className="text-[10px] font-black uppercase opacity-60 mb-1">Timeline</p>
                                                    <p className="text-2xl font-black">{result.schedule?.total_duration_days || duration} Days</p>
                                                </div>
                                                <div className="bg-white/10 p-4 rounded-2xl border border-white/10 backdrop-blur-sm">
                                                    <p className="text-[10px] font-black uppercase opacity-60 mb-1">Complexity</p>
                                                    <p className="text-2xl font-black capitalize">{result.interpretation?.complexity || "Medium"}</p>
                                                </div>
                                                <div className="bg-white/10 p-4 rounded-2xl border border-white/10 backdrop-blur-sm">
                                                    <p className="text-[10px] font-black uppercase opacity-60 mb-1">Method</p>
                                                    <p className="text-2xl font-black">Agentic</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* Execution Roadmap */}
                                    <Card title="Execution Roadmap" emoji="🚀">
                                        <div className="space-y-4">
                                            {result.tasks && result.tasks.map((task, idx) => (
                                                <div key={task.task_id || idx} className="p-6 rounded-2xl hover:bg-slate-50 transition-all border border-slate-50 bg-white">
                                                    <div className="flex gap-6">
                                                        <div className="flex-shrink-0 w-12 h-12 rounded-2xl bg-indigo-600 text-white flex items-center justify-center font-black text-xl shadow-lg shadow-indigo-100">
                                                            {task.task_id || (idx + 1)}
                                                        </div>
                                                        <div className="flex-grow">
                                                            <div className="flex justify-between items-start mb-3">
                                                                <div>
                                                                    <h4 className="font-black text-slate-800 text-lg tracking-tight">{task.task_name || "Task Item"}</h4>
                                                                    <div className="flex gap-2 mt-1">
                                                                        <Badge color="amber">{task.estimated_days || 1} Days</Badge>
                                                                        {task.required_tools && task.required_tools.map(tool => (
                                                                            <Badge key={tool} color="slate">{tool}</Badge>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            
                                                            <p className="text-sm text-slate-600 leading-relaxed mb-4">{task.description}</p>
                                                            
                                                            {task.deliverables && (
                                                                <div className="mt-4 pt-4 border-t border-slate-100">
                                                                    <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Key Deliverables</p>
                                                                    <div className="flex flex-wrap gap-2">
                                                                        {(Array.isArray(task.deliverables) ? task.deliverables : [task.deliverables]).map((d, i) => (
                                                                            <div key={i} className="flex items-center gap-1.5 text-xs text-slate-500 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-100">
                                                                                <span className="text-indigo-500 font-bold">✓</span> {d}
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </Card>

                                    {/* Daywise Schedule */}
                                    <Card title="Day-by-Day Schedule" emoji="📅">
                                        <DaywisePlan schedule={result.schedule} />
                                    </Card>

                                    {/* Timeline & Milestones */}
                                    {result.schedule && result.schedule.milestones && (
                                        <Card title="Project Milestones" emoji="🚩">
                                            <div className="relative pl-8 space-y-8 before:absolute before:left-3 before:top-2 before:bottom-2 before:w-0.5 before:bg-slate-100">
                                                {result.schedule.milestones.map((m, i) => (
                                                    <div key={i} className="relative">
                                                        <div className="absolute -left-8 top-1.5 w-6 h-6 rounded-full bg-white border-4 border-indigo-600 z-10"></div>
                                                        <div className="flex justify-between items-start bg-slate-50/50 p-4 rounded-2xl border border-slate-100/50">
                                                            <div>
                                                                <h4 className="font-black text-slate-800 text-sm tracking-tight">{m.milestone || m.name || m}</h4>
                                                                <p className="text-xs text-slate-500 mt-1 font-medium">{m.description || "Critical project achievement"}</p>
                                                            </div>
                                                            {m.day && (
                                                                <span className="text-[10px] font-black bg-indigo-600 text-white px-3 py-1 rounded-full shadow-lg shadow-indigo-100">DAY {m.day}</span>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </Card>
                                    )}
                                </div>
                            ) : (
                                <div className="h-full min-h-[500px] glass-card rounded-3xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center text-center p-12">
                                    <div className="text-7xl mb-6 opacity-20">🎯</div>
                                    <h3 className="text-2xl font-black text-slate-800 mb-2 tracking-tight">Configure Your Strategy</h3>
                                    <p className="text-slate-500 max-w-sm mx-auto leading-relaxed font-medium">
                                        Adjust the duration and constraints on the left to generate a personalized agentic marketing plan.
                                    </p>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    <footer className="mt-20 pt-8 border-t border-slate-200 text-center">
                        <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.3em]">
                            Agentic Planning Assistant • Powered by Gemini Flash 2.0
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
